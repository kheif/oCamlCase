<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/flaticon.png" />
    <link rel="stylesheet" href="/playground/css/codemirror/codemirror.min.css" />
    <link rel="stylesheet" href="/playground/css/codemirror/dialog.css" />
    <link rel="stylesheet" href="/playground/css/codemirror/show-hint.css" />
    <title>oCamlCase</title>
    <meta
      name="description"
      content="A practical guide to OCaml with functional patterns, type system features, and coding exercises. Written for programmers who want to understand the language."
    />
    <script>
      // GitHub Pages SPA fallback: 404.html redirects unknown paths to /?p=...
      // Restore the real path before React mounts so React Router sees it.
      (function () {
        var u = new URL(window.location.href);
        var p = u.searchParams.get('p');
        if (p) {
          u.searchParams.delete('p');
          var search = u.searchParams.toString();
          var newUrl = p + (search ? '?' + search : '') + u.hash;
          window.history.replaceState(null, '', newUrl);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
