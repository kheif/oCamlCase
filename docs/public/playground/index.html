<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Playground | oCamlCase</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=/?p=%2Fplayground">
  <link rel="canonical" href="/playground">
  <script>
    // Route via the SPA fallback (/?p=/playground) instead of /playground
    // directly: GitHub Pages 301-redirects /playground to /playground/
    // (because docs/playground/ is a real directory), which would loop us
    // straight back to this file. Going through / lets the SPA bootstrap
    // restore the path before React Router takes over.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      });
    }
    location.replace('/?p=' + encodeURIComponent('/playground') + location.search.replace(/^\?/, '&') + location.hash);
  </script>
</head>
<body>
  <p>Redirecting to <a href="/playground">/playground</a>…</p>
</body>
</html>
